<html>
    <head>
        
    </head>
    <body>
        <h1>Simple Calculator</h1>
        <h2>Add two Numbers</h2>
        <input type ="number" id="num1" placeholder="Enter first Number"><br><br>
        <input type ="number" id="num2" placeholder="Enter Second Number"><br><br>
        <button onclick="Display()"> Add</button>
        <b id="result"></b>
        <script>
            function Display(){
                let n1 = document.getElementById("num1").value;
                let n2= document.getElementById("num2").value;
                let a = addnumbers(n1,n2);
                document.getElementById("result").textContent="Addition is :"+a;
            }
            function addnumbers(n1,n2){
                let sum = Number(n1)+Number(n2);
                return sum;
            }
        </script>
    </body>
</html>
