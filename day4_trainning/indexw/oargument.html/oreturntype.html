<html>
    <head>
        <h1>CALCULATOR</h1>
    </head>
    <body>
        <input type="number" id="num1" placeholder="Enter First Number"><br><br>
        <input type="number" id="num2" placeholder="Enter Second number"><br><br>
        <button onclick="addNumbers()">Add</button>
        <button onclick="subNumbers()">Sub</button>
        <button onclick="mulNumbers()">Mul</button>
        <button onclick="divNumbers()">Div</button>
        <h1 id="result"></h1>
    </body>
    <script>
        function addNumbers(){
        let n1= document.getElementById("num1").value;
        let n2= document.getElementById("num2").value;
            let sum= Number(n1)+Number(n2);
            document.getElementById("result").textContent="Addition is:"+sum;
        }
        function subNumbers(){
        let n1= document.getElementById("num1").value;
        let n2= document.getElementById("num2").value;
        let sub=Number(n1)-Number(n2);
        document.getElementById("result").textContent="Subtraction is:"+sub;
        }
        function mulNumbers(){
            let n1= document.getElementById("num1").value;
            let n2= document.getElementById("num2").value;
            let mul=Number(n1)*Number(n2);
            document.getElementById("result").textContent="Multiplication is:"+mul;
        }
        function divNumbers(){
            let n1= document.getElementById("num1").value;
            let n2= document.getElementById("num2").value;
            let div=Number(n1)/Number(n2);
            document.getElementById("result").textContent="Division is:"+div;

        }
        
    </script>
</html>
