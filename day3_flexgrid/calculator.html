<html>
    <body>
        <button onclick="add()" style= "background-color:rgb(28, 217, 63)">Add</button>
        <button onclick="sub()" style="background-color: red;">Sub</button>
        <button onclick="mul()" style="background-color: blue;">Mul</button>
        <button onclick="dive()" style="background-color: black;"> Div</button>
    </body>
    <script> 
        var n1=100;
        var n2=200;
        function add(){
            alert(n1+n2);
        }
        function sub(){
            alert(n2-n1);
        }
        function mul(){
            alert(n1*n2);
        }
        function dive(){
            alert(n1/n2);
        }
        </script>
</html>
